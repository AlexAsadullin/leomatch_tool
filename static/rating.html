<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Анкета — leodv</title>
  <link rel="stylesheet" href="/static/style.css?v=11" />
  <style>
    body { padding-bottom: 148px; }

    .page-header {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px;
      background: #fff; border-bottom: 1px solid #e5e5ea;
      position: sticky; top: 0; z-index: 10;
    }
    .page-header h1 {
      margin: 0; font-size: 15px; flex: 1;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .profile-body { max-width: 600px; margin: 16px auto; padding: 0 16px; }

    .profile-photo {
      width: 100%; max-height: 72vh;
      object-fit: contain; border-radius: 10px;
      background: #000; display: block;
    }
    .profile-video { width: 100%; border-radius: 10px; display: block; background: #000; }
    .profile-photo-placeholder {
      width: 100%; aspect-ratio: 3/4; background: #e5e5ea;
      border-radius: 10px; display: flex;
      align-items: center; justify-content: center; font-size: 64px;
    }
    .profile-media { display: flex; flex-direction: column; gap: 8px; }

    .profile-info-card {
      background: #f5f5f7; border-radius: 10px;
      padding: 11px 14px; margin-top: 14px;
      display: flex; gap: 18px; flex-wrap: wrap;
      font-size: 13px; color: #6e6e73;
    }
    .profile-info-card b { color: #1c1c1e; }

    /* ─── Bottom bar ─────────────────────────────────────────────── */
    .bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(10px);
      border-top: 1px solid #e5e5ea;
      padding: 10px 14px 14px;
      z-index: 20;
    }

    /* prev / next row */
    .bottom-nav {
      display: flex; align-items: center; gap: 8px;
      max-width: 600px; margin: 0 auto 8px;
    }
    .nav-btn {
      flex: 1; padding: 8px 6px;
      border: 1px solid #c7c7cc; background: #fff;
      border-radius: 8px; font-size: 13px; font-weight: 500;
      cursor: pointer; white-space: nowrap;
    }
    .nav-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .nav-btn:not(:disabled):hover { background: #f0f0f5; }
    .nav-pos { flex: 1; text-align: center; font-size: 12px; color: #8e8e93; }

    /* rating label */
    .rating-label {
      text-align: center; font-size: 13px; color: #6e6e73; margin-bottom: 6px;
    }
    .rating-label b { color: #ff9500; }

    /* rating buttons */
    .rating-btns { display: flex; gap: 4px; max-width: 600px; margin: 0 auto; }
    .rating-btn {
      flex: 1; padding: 10px 0;
      border: 1px solid #c7c7cc; background: #fff;
      border-radius: 7px; font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .rating-btn:hover { background: #f5f5f7; }
    .rating-btn.active { background: #ff9500; color: #fff; border-color: #ff9500; }

    #status { text-align: center; padding: 48px 16px; color: #6e6e73; }
  </style>
</head>
<body>
  <header class="page-header">
    <a href="/gallery" class="mode-btn" style="text-decoration:none;white-space:nowrap;font-size:13px">← Галерея</a>
    <h1 id="headerTitle">Загрузка…</h1>
    <a href="/" class="mode-btn" style="text-decoration:none;white-space:nowrap;font-size:13px">Главный экран</a>
  </header>

  <div id="status">Загрузка…</div>
  <div id="profileBody" class="profile-body" style="display:none"></div>

  <div class="bottom-bar" id="bottomBar" style="display:none">
    <div class="bottom-nav">
      <button class="nav-btn" id="prevBtn" disabled>◀ Предыдущая</button>
      <span class="nav-pos" id="navPos"></span>
      <button class="nav-btn" id="nextBtn" disabled>Следующая ▶</button>
    </div>
    <div class="rating-label">Оценка: <b id="ratingValue">не оценена</b></div>
    <div class="rating-btns" id="ratingBtns"></div>
  </div>

  <script>
  (() => {
    const LS_IDS = 'leodv_gallery_ids';
    const params = new URLSearchParams(location.search);
    const id = parseInt(params.get('id'), 10);

    const statusEl  = document.getElementById('status');
    const bodyEl    = document.getElementById('profileBody');
    const bottomBar = document.getElementById('bottomBar');
    const ratingVal = document.getElementById('ratingValue');
    const btnsEl    = document.getElementById('ratingBtns');
    const prevBtn   = document.getElementById('prevBtn');
    const nextBtn   = document.getElementById('nextBtn');
    const navPosEl  = document.getElementById('navPos');

    if (!id) { statusEl.textContent = 'ID не указан'; return; }

    // ─── Prev / next ────────────────────────────────────────────────
    const sortedIds = (() => {
      try { return JSON.parse(localStorage.getItem(LS_IDS) || '[]'); } catch { return []; }
    })();
    const idx    = sortedIds.indexOf(id);
    const prevId = idx > 0                          ? sortedIds[idx - 1] : null;
    const nextId = idx < sortedIds.length - 1       ? sortedIds[idx + 1] : null;

    if (prevId) { prevBtn.disabled = false; prevBtn.onclick = () => go(prevId); }
    if (nextId) { nextBtn.disabled = false; nextBtn.onclick = () => go(nextId); }
    if (sortedIds.length && idx >= 0)
      navPosEl.textContent = `${idx + 1} / ${sortedIds.length}`;

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft'  && prevId) go(prevId);
      if (e.key === 'ArrowRight' && nextId) go(nextId);
    });

    function go(tid) { location.href = `/rating?id=${tid}`; }

    // ─── Load & render ───────────────────────────────────────────────
    (async () => {
      let p;
      try {
        const r = await fetch(`/api/ratings/${id}`);
        if (!r.ok) { statusEl.textContent = 'Анкета не найдена'; return; }
        p = await r.json();
      } catch { statusEl.textContent = 'Ошибка загрузки'; return; }

      const firstName = p.description.split(/[\n,]/)[0].trim();
      document.getElementById('headerTitle').textContent = firstName;
      document.title = firstName + ' — leodv';

      statusEl.style.display = 'none';
      bodyEl.style.display = '';

      // Media
      const mediaEl = document.createElement('div');
      mediaEl.className = 'profile-media';
      if (p.media_urls && p.media_urls.length) {
        for (const url of p.media_urls) {
          const ext = url.split('.').pop().toLowerCase();
          let el;
          if (['mp4','mov','webm','mkv','gif'].includes(ext)) {
            el = Object.assign(document.createElement('video'),
                               { className: 'profile-video', controls: true, src: url });
          } else {
            el = Object.assign(document.createElement('img'),
                               { className: 'profile-photo', src: url, alt: '', loading: 'lazy' });
          }
          mediaEl.appendChild(el);
        }
      } else {
        const ph = Object.assign(document.createElement('div'),
                                 { className: 'profile-photo-placeholder', textContent: '👤' });
        mediaEl.appendChild(ph);
      }
      bodyEl.appendChild(mediaEl);

      // Metadata
      const infoCard = document.createElement('div');
      infoCard.className = 'profile-info-card';
      infoCard.innerHTML =
        `<span>📅 Добавлена: <b>${escHtml(p.registered_at ? fmtDate(p.registered_at) : '—')}</b></span>` +
        `<span>👁 Встречалась: <b>${p.seen_count} раз</b></span>`;
      bodyEl.appendChild(infoCard);

      // Description
      const pre = Object.assign(document.createElement('pre'),
                                { className: 'desc', textContent: p.description });
      pre.style.marginTop = '14px';
      bodyEl.appendChild(pre);

      // ─── Rating ────────────────────────────────────────────────
      let curRating = p.rating;
      bottomBar.style.display = '';

      function updateRating() {
        ratingVal.textContent = curRating === -1 ? 'не оценена' : `${curRating}/10`;
        btnsEl.querySelectorAll('.rating-btn').forEach(b =>
          b.classList.toggle('active', +b.dataset.v === curRating));
      }

      for (let i = 1; i <= 10; i++) {
        const btn = document.createElement('button');
        btn.className = 'rating-btn';
        btn.textContent = i;
        btn.dataset.v = i;
        btn.onclick = () => {
          curRating = i;
          updateRating();
          fetch(`/api/ratings/${id}/rate`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ rating: i }),
          });
        };
        btnsEl.appendChild(btn);
      }
      updateRating();
    })();

    function fmtDate(ts) {
      return new Date(ts * 1000).toLocaleDateString('ru-RU',
        { day: '2-digit', month: '2-digit', year: 'numeric' });
    }
    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  })();
  </script>
</body>
</html>
